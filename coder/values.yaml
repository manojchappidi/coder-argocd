coder:
  env:
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-postgresql-secret
          key: postgres-password

  service:
    type: ClusterIP

  ingress:
    enabled: true
    className: nginx

    hosts:
      - host: coder.example.com
        paths:
          - path: /
            pathType: Prefix

    tls: []

postgresql:
  enabled: false

externalDatabase:
  host: postgres.argocd-poc.svc.cluster.local
  port: 5432
  user: postgres
  database: coder
  existingSecret: coder-postgresql-secret
  existingSecretKey: postgres-password
