coder:
  env:
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-postgresql-secret
          key: postgres-password

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: coder.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5

postgresql:
  enabled: false

externalDatabase:
  host: postgres.argocd-poc.svc.cluster.local
  port: 5432
  user: postgres
  database: coder
  existingSecret: coder-postgresql-secret
  existingSecretKey: postgres-password
